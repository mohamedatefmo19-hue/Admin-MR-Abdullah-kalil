<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | مستر عبدالله خليل</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <!-- Cloudinary Upload Widget -->
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
    <!-- OneSignal -->
    <script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" async=""></script>
    <style>
        :root {
            --bg-primary: #050510;
            --bg-secondary: #0a0a1e;
            --bg-card: rgba(255, 255, 255, 0.02);
            --glass-bg: rgba(255, 255, 255, 0.035);
            --glass-border: rgba(255, 255, 255, 0.07);
            --glass-hover: rgba(255, 255, 255, 0.06);
            --text-primary: #f0f0f5;
            --text-secondary: #b0b0c8;
            --text-muted: #6b6b8a;
            --accent-1: #4da8da;
            --accent-2: #7c5ce7;
            --accent-3: #22d3bb;
            --accent-4: #f472b6;
            --accent-5: #fbbf24;
            --accent-gradient: linear-gradient(135deg, #4da8da 0%, #7c5ce7 50%, #22d3bb 100%);
            --shadow-glow: 0 0 60px rgba(124, 92, 231, 0.25);
            --radius-md: 14px;
            --radius-lg: 20px;
            --font-ar: 'Cairo', 'Tajawal', sans-serif;
            --transition-fast: 0.2s ease;
            --transition-smooth: 0.45s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-ar);
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        /* Login Screen */
        .login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            flex-direction: column;
            gap: 24px;
            backdrop-filter: blur(20px);
        }
        .login-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 32px 28px;
            width: 90%;
            max-width: 420px;
            backdrop-filter: blur(30px);
            box-shadow: var(--shadow-glow);
        }
        .login-box h2 { text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 14px; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1.5px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-family: var(--font-ar);
            font-size: 0.9rem;
            outline: none;
        }
        .btn {
            padding: 10px 22px;
            border-radius: 30px;
            font-family: var(--font-ar);
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            color: var(--text-primary);
            border: 1.5px solid var(--glass-border);
        }
        .btn-primary {
            background: var(--accent-gradient);
            border: none;
            color: #fff;
            box-shadow: 0 6px 24px rgba(124,92,231,0.35);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 35px rgba(124,92,231,0.5); }
        .btn-block { width: 100%; justify-content: center; }
        .error-msg { color: #f87171; font-size: 0.8rem; margin-top: 4px; }
        /* Sidebar */
        .sidebar {
            width: 270px;
            background: rgba(10,10,30,0.75);
            backdrop-filter: blur(35px);
            border-left: 1px solid var(--glass-border);
            padding: 28px 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
            z-index: 10;
            transition: transform 0.4s;
            overflow-y: auto;
            position: relative;
        }
        .sidebar .logo-img {
            width: 60px; height: 60px;
            border-radius: var(--radius-md);
            background: var(--accent-gradient);
            display: flex; align-items:center; justify-content:center;
            margin: 0 auto 8px;
            font-size: 1.8rem; color:#fff;
            box-shadow: var(--shadow-glow);
        }
        .sidebar nav a {
            display: flex; align-items:center; gap:12px;
            padding: 11px 16px; border-radius:30px;
            color: var(--text-secondary); text-decoration:none;
            font-weight:500; font-size:0.88rem; cursor:pointer;
            transition: var(--transition-fast);
        }
        .sidebar nav a:hover, .sidebar nav a.active {
            background: rgba(255,255,255,0.05); color:#fff;
        }
        .sidebar nav a.active { background: rgba(124,92,231,0.2); }
        .main {
            flex:1; display:flex; flex-direction:column; overflow-y:auto; max-height:100vh;
        }
        .top-bar {
            padding: 16px 28px; display:flex; justify-content:space-between; align-items:center;
            background: rgba(10,10,26,0.75); backdrop-filter:blur(25px);
            border-bottom:1px solid var(--glass-border); position:sticky; top:0; z-index:15;
        }
        .content-area { padding:24px; flex:1; }
        .tab-panel { display:none; animation: fadeSlideIn 0.35s ease; }
        .tab-panel.active { display:block; }
        @keyframes fadeSlideIn { from{opacity:0;transform:translateY(18px);} to{opacity:1;transform:translateY(0);} }
        .stats-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap:16px; margin-bottom:28px; }
        .stat-card {
            background: var(--glass-bg); border:1px solid var(--glass-border);
            border-radius:var(--radius-lg); padding:20px; backdrop-filter:blur(15px);
        }
        .stat-value { font-size:2rem; font-weight:800; }
        .table-wrapper {
            background: var(--glass-bg); border:1px solid var(--glass-border);
            border-radius:var(--radius-lg); overflow-x:auto; margin-top:12px;
        }
        table { width:100%; border-collapse:collapse; font-size:0.84rem; min-width:700px; }
        th,td { padding:12px 16px; text-align:right; border-bottom:1px solid rgba(255,255,255,0.04); white-space:nowrap; }
        th { color:var(--text-muted); font-size:0.72rem; text-transform:uppercase; }
        .badge {
            padding:4px 10px; border-radius:20px; font-size:0.7rem; font-weight:600;
        }
        .badge-success { background:rgba(34,211,187,0.2); color:#22d3bb; }
        .badge-warning { background:rgba(251,191,36,0.2); color:#fbbf24; }
        .badge-danger { background:rgba(239,68,68,0.2); color:#f87171; }
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(10px);
            display:flex; align-items:center; justify-content:center; z-index:100;
            opacity:0; visibility:hidden; transition:0.35s;
        }
        .modal-overlay.active { opacity:1; visibility:visible; }
        .modal {
            background:var(--bg-secondary); border:1px solid var(--glass-border);
            border-radius:var(--radius-lg); padding:28px; width:92%; max-width:500px;
            max-height:85vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.6);
        }
        .notification-toast {
            position:fixed; bottom:30px; left:30px; background:var(--bg-secondary);
            border:1px solid var(--glass-border); border-radius:var(--radius-md);
            padding:14px 20px; z-index:200; backdrop-filter:blur(20px);
            animation: slideIn 0.4s;
        }
        @keyframes slideIn { from{transform:translateX(-100%);opacity:0;} to{transform:translateX(0);opacity:1;} }
        @media (max-width:768px) {
            .sidebar { position:fixed; right:-290px; top:0; bottom:0; }
            .sidebar.open { right:0; }
            .main { width:100%; }
            .stats-grid { grid-template-columns:1fr 1fr; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h2>🔐 دخول الأدمن</h2>
            <div class="form-group"><input type="email" id="loginEmail" placeholder="البريد الإلكتروني" dir="ltr"></div>
            <div class="form-group"><input type="password" id="loginPassword" placeholder="كلمة المرور"></div>
            <div id="loginError" class="error-msg"></div>
            <button class="btn btn-primary btn-block" onclick="adminLogin()">تسجيل الدخول</button>
            <p style="text-align:center;margin-top:12px;font-size:0.8rem;color:var(--text-muted);">أو <a href="#" onclick="showRegister()" style="color:var(--accent-1);">إنشاء حساب أدمن</a></p>
        </div>
        <div class="login-box" id="registerBox" style="display:none;">
            <h2>إنشاء حساب أدمن</h2>
            <div class="form-group"><input type="email" id="regEmail" placeholder="البريد الإلكتروني" dir="ltr"></div>
            <div class="form-group"><input type="password" id="regPassword" placeholder="كلمة المرور (6+ أحرف)"></div>
            <div id="regError" class="error-msg"></div>
            <button class="btn btn-primary btn-block" onclick="adminRegister()">إنشاء الحساب</button>
            <p style="text-align:center;margin-top:12px;font-size:0.8rem;color:var(--text-muted);"><a href="#" onclick="showLogin()" style="color:var(--accent-1);">تسجيل الدخول</a></p>
        </div>
    </div>

    <!-- Main Dashboard (hidden initially) -->
    <div id="dashboardContainer" style="display:none; width:100%;">
        <aside class="sidebar" id="sidebar">
            <div class="logo-area" style="text-align:center;margin-bottom:20px;">
                <div class="logo-img" id="sidebarLogoPreview">⚛️</div>
                <div style="font-weight:800;color:#fff;">لوحة التحكم</div>
            </div>
            <nav>
                <a class="active" data-tab="dashboard">📊 الرئيسية</a>
                <a data-tab="students">👥 الطلاب</a>
                <a data-tab="grades">📚 الصفوف</a>
                <a data-tab="courses">📖 الكورسات</a>
                <a data-tab="lessons">🎬 المحاضرات</a>
                <a data-tab="assignments">📝 الواجبات</a>
                <a data-tab="exams">✅ الامتحانات</a>
                <a data-tab="questions">❓ الأسئلة</a>
                <a data-tab="settings">⚙️ الإعدادات</a>
            </nav>
            <button class="btn btn-sm" style="margin-top:auto;" onclick="firebase.auth().signOut()">تسجيل الخروج</button>
        </aside>
        <div class="main">
            <div class="top-bar">
                <button class="btn btn-sm" id="menuToggle" style="display:none;">☰</button>
                <h2 id="tabTitle">📊 لوحة التحكم</h2>
                <div style="display:flex;gap:8px;">
                    <a href="index.html" class="btn btn-sm" target="_blank">عرض الموقع</a>
                    <button class="btn btn-primary btn-sm" onclick="sendPushNotification()">🔔 إشعار</button>
                </div>
            </div>
            <div class="content-area" id="contentArea">
                <!-- Panels dynamically rendered -->
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="genericModal"><div class="modal" id="genericModalContent"></div></div>

    <script>
        (function() {
            // Config
            const firebaseConfig = {
                apiKey: "AIzaSyDT0xGqGHzyyeB4qcz5AGMKxESCGZNNEWE",
                authDomain: "abdullah-khalil.firebaseapp.com",
                projectId: "abdullah-khalil",
                storageBucket: "abdullah-khalil.firebasestorage.app",
                messagingSenderId: "530661483867",
                appId: "1:530661483867:web:e2f165e9f808bcfcb8267e"
            };
            const CLOUDINARY_CLOUD = "864215656447737";
            const CLOUDINARY_PRESET = "ml_default";
            const ONESIGNAL_APP_ID = "os_v2_app_mk6n33aj55ditcmb3n5fpo66rsihml7iabcekj5ofx5anzjsjoli2ulxvakacn4srunaazbtwcvmdzed45erspjkmljiagwpfhyyl5a";

            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            const auth = firebase.auth();
            window.db = db;
            window.auth = auth;

            // OneSignal
            if (ONESIGNAL_APP_ID) {
                window.OneSignal = window.OneSignal || [];
                OneSignal.push(() => OneSignal.init({ appId: ONESIGNAL_APP_ID }));
            }

            // Auth UI
            window.showRegister = () => {
                document.getElementById('registerBox').style.display = 'block';
                document.querySelector('#loginScreen .login-box:first-child').style.display = 'none';
            };
            window.showLogin = () => {
                document.getElementById('registerBox').style.display = 'none';
                document.querySelector('#loginScreen .login-box:first-child').style.display = 'block';
            };

            window.adminLogin = async () => {
                const email = document.getElementById('loginEmail').value.trim();
                const pass = document.getElementById('loginPassword').value;
                try {
                    await auth.signInWithEmailAndPassword(email, pass);
                } catch (e) {
                    document.getElementById('loginError').textContent = 'خطأ: ' + e.message;
                }
            };
            window.adminRegister = async () => {
                const email = document.getElementById('regEmail').value.trim();
                const pass = document.getElementById('regPassword').value;
                if (pass.length < 6) {
                    document.getElementById('regError').textContent = 'كلمة المرور 6 أحرف على الأقل';
                    return;
                }
                try {
                    await auth.createUserWithEmailAndPassword(email, pass);
                } catch (e) {
                    document.getElementById('regError').textContent = 'خطأ: ' + e.message;
                }
            };

            auth.onAuthStateChanged(user => {
                if (user) {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('dashboardContainer').style.display = 'flex';
                    initDashboard();
                } else {
                    document.getElementById('loginScreen').style.display = 'flex';
                    document.getElementById('dashboardContainer').style.display = 'none';
                }
            });

            // Dashboard Logic
            let currentTab = 'dashboard';
            const collections = {
                students: 'students',
                grades: 'grades',
                courses: 'courses',
                lessons: 'lessons',
                assignments: 'assignments',
                exams: 'exams',
                questions: 'questions',
                settings: 'settings',
                activity: 'activity'
            };

            async function getCollection(col) {
                const snap = await db.collection(col).orderBy('createdAt', 'desc').get();
                return snap.docs.map(d => ({ id: d.id, ...d.data() }));
            }
            async function addDoc(col, data) {
                data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                const ref = await db.collection(col).add(data);
                return { id: ref.id, ...data };
            }
            async function updateDoc(col, id, data) {
                await db.collection(col).doc(id).update(data);
            }
            async function deleteDoc(col, id) {
                await db.collection(col).doc(id).delete();
            }

            function showToast(msg) {
                const t = document.createElement('div');
                t.className = 'notification-toast';
                t.textContent = msg;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            }

            // Upload helper
            function uploadFile(resourceType, formats, callback) {
                window.cloudinary.openUploadWidget({
                    cloudName: CLOUDINARY_CLOUD,
                    uploadPreset: CLOUDINARY_PRESET,
                    sources: ['local', 'url', 'camera'],
                    multiple: false,
                    maxFiles: 1,
                    resourceType: resourceType,
                    clientAllowedFormats: formats,
                    maxFileSize: 500000000,
                    language: 'ar'
                }, (error, result) => {
                    if (error) { showToast('فشل الرفع'); return; }
                    if (result && result.event === 'success') {
                        callback(result.info.secure_url);
                        showToast('تم الرفع بنجاح');
                    }
                });
            }

            // Renders
            async function renderDashboard() {
                const [students, courses, lessons, exams, assignments, questions] = await Promise.all([
                    getCollection(collections.students),
                    getCollection(collections.courses),
                    getCollection(collections.lessons),
                    getCollection(collections.exams),
                    getCollection(collections.assignments),
                    getCollection(collections.questions)
                ]);
                document.getElementById('contentArea').innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-value">${students.length}</div><small>طالب</small></div>
                        <div class="stat-card"><div class="stat-value">${courses.length}</div><small>كورس</small></div>
                        <div class="stat-card"><div class="stat-value">${lessons.length}</div><small>محاضرة</small></div>
                        <div class="stat-card"><div class="stat-value">${exams.length}</div><small>امتحان</small></div>
                        <div class="stat-card"><div class="stat-value">${assignments.length}</div><small>واجب</small></div>
                        <div class="stat-card"><div class="stat-value">${questions.length}</div><small>سؤال</small></div>
                    </div>
                    <h3>آخر النشاطات</h3>
                    <div class="table-wrapper"><table><thead><tr><th>الحدث</th><th>التفاصيل</th></tr></thead><tbody id="actBody"></tbody></table></div>
                `;
                const act = await getCollection(collections.activity);
                document.getElementById('actBody').innerHTML = act.slice(0,8).map(a => `<tr><td>${a.event}</td><td>${a.detail||''}</td></tr>`).join('');
            }

            async function renderStudents() {
                const students = await getCollection(collections.students);
                document.getElementById('contentArea').innerHTML = `
                    <input type="text" id="studentSearch" placeholder="بحث..." style="margin-bottom:12px;padding:8px;border-radius:20px;background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);color:#fff;">
                    <div class="table-wrapper"><table><thead><tr><th>الاسم</th><th>الصف</th><th>الهاتف</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody id="stuBody"></tbody></table></div>
                `;
                const render = (filter) => {
                    const filtered = filter ? students.filter(s => s.name?.includes(filter) || s.phone?.includes(filter)) : students;
                    document.getElementById('stuBody').innerHTML = filtered.map(s => `
                        <tr><td>${s.name||''}</td><td>${s.grade||''}</td><td>${s.phone||''}</td>
                        <td><span class="badge ${s.status==='مفعل'?'badge-success':s.status==='محظور'?'badge-danger':'badge-warning'}">${s.status||'قيد المراجعة'}</span></td>
                        <td>
                            <button class="btn btn-sm" onclick="changeStatus('${s.id}','مفعل')">تفعيل</button>
                            <button class="btn btn-sm" onclick="changeStatus('${s.id}','محظور')">حظر</button>
                            <button class="btn btn-sm" onclick="del('students','${s.id}')">🗑️</button>
                        </td></tr>
                    `).join('');
                };
                render();
                document.getElementById('studentSearch').addEventListener('input', e => render(e.target.value));
            }

            async function renderGrades() {
                const grades = await getCollection(collections.grades);
                document.getElementById('contentArea').innerHTML = `
                    <button class="btn btn-primary" onclick="showGradeForm()">➕ إضافة صف</button>
                    <div class="table-wrapper" style="margin-top:12px;"><table><thead><tr><th>الاسم</th><th>الصورة</th><th>كورسات</th><th>إجراءات</th></tr></thead><tbody id="grBody"></tbody></table></div>
                `;
                document.getElementById('grBody').innerHTML = grades.map(g => `
                    <tr><td>${g.name}</td><td><img src="${g.img||''}" style="width:40px;height:40px;border-radius:8px;" onerror="this.style.display='none'"></td><td>${g.courses||0}</td>
                    <td><button class="btn btn-sm" onclick="editGrade('${g.id}')">✏️</button> <button class="btn btn-sm" onclick="del('grades','${g.id}')">🗑️</button></td></tr>
                `).join('');
            }

            async function renderCourses() {
                const courses = await getCollection(collections.courses);
                const grades = await getCollection(collections.grades);
                document.getElementById('contentArea').innerHTML = `
                    <button class="btn btn-primary" onclick="showCourseForm()">➕ إضافة كورس</button>
                    <div class="table-wrapper" style="margin-top:12px;"><table><thead><tr><th>الاسم</th><th>الصف</th><th>النوع</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody id="coBody"></tbody></table></div>
                `;
                document.getElementById('coBody').innerHTML = courses.map(c => `
                    <tr><td>${c.name}</td><td>${c.grade}</td><td>${c.type||'مدفوع'}</td><td>${c.status||'ظاهر'}</td>
                    <td><button class="btn btn-sm" onclick="editCourse('${c.id}')">✏️</button> <button class="btn btn-sm" onclick="del('courses','${c.id}')">🗑️</button></td></tr>
                `).join('');
            }

            async function renderLessons() {
                const lessons = await getCollection(collections.lessons);
                document.getElementById('contentArea').innerHTML = `
                    <button class="btn btn-primary" onclick="showLessonForm()">➕ إضافة محاضرة</button>
                    <div class="table-wrapper" style="margin-top:12px;"><table><thead><tr><th>العنوان</th><th>الكورس</th><th>فيديو</th><th>PDF</th><th>بث</th><th>إجراءات</th></tr></thead><tbody id="lsBody"></tbody></table></div>
                `;
                document.getElementById('lsBody').innerHTML = lessons.map(l => `
                    <tr><td>${l.title}</td><td>${l.course}</td><td>${l.video?'✅':'❌'}</td><td>${l.pdf?'✅':'❌'}</td><td>${l.live?'نعم':'لا'}</td>
                    <td><button class="btn btn-sm" onclick="editLesson('${l.id}')">✏️</button> <button class="btn btn-sm" onclick="del('lessons','${l.id}')">🗑️</button></td></tr>
                `).join('');
            }

            async function renderAssignments() {
                const assignments = await getCollection(collections.assignments);
                document.getElementById('contentArea').innerHTML = `
                    <button class="btn btn-primary" onclick="showAssignmentForm()">➕ واجب جديد</button>
                    <div class="table-wrapper" style="margin-top:12px;"><table><thead><tr><th>صورة</th><th>الوصف</th><th>المحاضرة</th><th>النوع</th><th>الإجابة</th><th>حلول</th><th>إجراءات</th></tr></thead><tbody id="asBody"></tbody></table></div>
                `;
                document.getElementById('asBody').innerHTML = assignments.map(a => `
                    <tr><td>${a.image?`<img src="${a.image}" width="40" height="40" style="border-radius:8px;">`:'📝'}</td>
                    <td>${a.desc||''}</td><td>${a.lesson}</td><td>${a.type}</td><td>${a.correct||'-'}</td><td>${a.solutions||0}</td>
                    <td><button class="btn btn-sm" onclick="viewSolutions('${a.id}')">عرض</button> <button class="btn btn-sm" onclick="del('assignments','${a.id}')">🗑️</button></td></tr>
                `).join('');
            }

            async function renderExams() {
                const exams = await getCollection(collections.exams);
                document.getElementById('contentArea').innerHTML = `
                    <button class="btn btn-primary" onclick="showExamForm()">➕ امتحان جديد</button>
                    <div class="table-wrapper" style="margin-top:12px;"><table><thead><tr><th>الاسم</th><th>الزمن</th><th>أسئلة</th><th>إظهار الحل</th><th>إجراءات</th></tr></thead><tbody id="exBody"></tbody></table></div>
                `;
                document.getElementById('exBody').innerHTML = exams.map(e => `
                    <tr><td>${e.name}</td><td>${e.time} د</td><td>${e.questions||0}</td><td>${e.showAnswer?'نعم':'لا'}</td>
                    <td><button class="btn btn-sm" onclick="editExam('${e.id}')">✏️</button> <button class="btn btn-sm" onclick="del('exams','${e.id}')">🗑️</button></td></tr>
                `).join('');
            }

            async function renderQuestions() {
                const questions = await getCollection(collections.questions);
                document.getElementById('contentArea').innerHTML = `
                    <div class="table-wrapper"><table><thead><tr><th>الطالب</th><th>السؤال</th><th>الحالة</th><th>الرد</th><th>إجراءات</th></tr></thead><tbody id="quBody"></tbody></table></div>
                `;
                document.getElementById('quBody').innerHTML = questions.map(q => `
                    <tr><td>${q.student}</td><td>${q.text}</td><td>${q.status||'مفتوح'}</td><td>${q.reply||'—'}</td>
                    <td><button class="btn btn-sm" onclick="replyQ('${q.id}')">رد</button> <button class="btn btn-sm" onclick="del('questions','${q.id}')">🗑️</button></td></tr>
                `).join('');
            }

            async function renderSettings() {
                const doc = await db.collection('settings').doc('platform').get();
                const s = doc.exists ? doc.data() : {};
                document.getElementById('contentArea').innerHTML = `
                    <h3>⚙️ إعدادات المنصة</h3>
                    <div style="display:grid;gap:12px;max-width:500px;">
                        <div class="form-group"><label>اسم المنصة</label><input id="setName" value="${s.platformName||'مستر عبدالله خليل'}"></div>
                        <div class="form-group"><label>الشعار</label><input id="setSlogan" value="${s.slogan||'كيمياء ببساطة'}"></div>
                        <div class="form-group"><label>اللوجو</label>
                            <button class="btn btn-sm" onclick="uploadLogo()">📷 رفع لوجو</button>
                            <img id="logoPreview" src="${s.logo||''}" style="width:80px;height:80px;border-radius:16px;margin-top:8px;object-fit:cover;background:var(--glass-bg);">
                        </div>
                        <button class="btn btn-primary" onclick="saveSettings()">💾 حفظ</button>
                    </div>
                `;
            }

            // Global actions
            window.changeStatus = async (id, status) => {
                await updateDoc('students', id, { status });
                renderStudents();
                showToast('تم تغيير الحالة');
            };
            window.del = async (col, id) => {
                if (confirm('تأكيد الحذف؟')) { await deleteDoc(col, id); refreshTab();
                    showToast('تم الحذف'); }
            };
            window.replyQ = async (id) => {
                const reply = prompt('الرد:');
                if (reply) { await updateDoc('questions', id, { reply, status: 'تم الرد' });
                    renderQuestions();
                    showToast('تم الرد'); }
            };
            window.uploadLogo = () => {
                uploadFile('image', ['png','jpg','jpeg'], url => {
                    document.getElementById('logoPreview').src = url;
                    document.getElementById('sidebarLogoPreview').innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:14px;">`;
                    db.collection('settings').doc('platform').set({ logo: url }, { merge: true });
                });
            };
            window.saveSettings = async () => {
                const data = {
                    platformName: document.getElementById('setName').value,
                    slogan: document.getElementById('setSlogan').value,
                    logo: document.getElementById('logoPreview').src
                };
                await db.collection('settings').doc('platform').set(data, { merge: true });
                showToast('تم الحفظ');
            };

            // Forms (simplified)
            window.showGradeForm = () => {
                const modal = document.getElementById('genericModal');
                document.getElementById('genericModalContent').innerHTML = `
                    <h3>إضافة صف</h3>
                    <div class="form-group"><input id="gName" placeholder="اسم الصف"></div>
                    <div class="form-group"><input id="gImg" placeholder="رابط الصورة (أو ارفع)"><button class="btn btn-sm" onclick="uploadFile('image',['png','jpg'],url=>document.getElementById('gImg').value=url)">رفع</button></div>
                    <button class="btn btn-primary" onclick="saveGrade()">حفظ</button>
                `;
                modal.classList.add('active');
            };
            window.saveGrade = async () => {
                const name = document.getElementById('gName').value;
                const img = document.getElementById('gImg').value;
                if (name) { await addDoc('grades', { name, img, courses: 0 });
                    closeModal();
                    renderGrades(); }
            };
            window.showCourseForm = () => {
                const modal = document.getElementById('genericModal');
                document.getElementById('genericModalContent').innerHTML = `
                    <h3>إضافة كورس</h3>
                    <div class="form-group"><input id="cName" placeholder="اسم الكورس"></div>
                    <div class="form-group"><select id="cGrade"></select></div>
                    <button class="btn btn-primary" onclick="saveCourse()">حفظ</button>
                `;
                getCollection('grades').then(grades => {
                    document.getElementById('cGrade').innerHTML = grades.map(g => `<option>${g.name}</option>`).join('');
                });
                modal.classList.add('active');
            };
            window.saveCourse = async () => {
                const name = document.getElementById('cName').value;
                const grade = document.getElementById('cGrade').value;
                if (name) { await addDoc('courses', { name, grade, type: 'مدفوع', status: 'ظاهر' });
                    closeModal();
                    renderCourses(); }
            };
            window.showLessonForm = () => {
                const modal = document.getElementById('genericModal');
                document.getElementById('genericModalContent').innerHTML = `
                    <h3>إضافة محاضرة</h3>
                    <div class="form-group"><input id="lTitle" placeholder="العنوان"></div>
                    <div class="form-group"><select id="lCourse"></select></div>
                    <div class="form-group"><input id="lVideo" placeholder="رابط الفيديو"> <button class="btn btn-sm" onclick="uploadFile('video',['mp4','webm'],url=>document.getElementById('lVideo').value=url)">🎬 رفع</button></div>
                    <div class="form-group"><input id="lPdf" placeholder="رابط PDF"> <button class="btn btn-sm" onclick="uploadFile('auto',['pdf'],url=>document.getElementById('lPdf').value=url)">📄 رفع</button></div>
                    <button class="btn btn-primary" onclick="saveLesson()">حفظ</button>
                `;
                getCollection('courses').then(courses => {
                    document.getElementById('lCourse').innerHTML = courses.map(c => `<option>${c.name}</option>`).join('');
                });
                modal.classList.add('active');
            };
            window.saveLesson = async () => {
                const title = document.getElementById('lTitle').value;
                const course = document.getElementById('lCourse').value;
                const video = document.getElementById('lVideo').value;
                const pdf = document.getElementById('lPdf').value;
                if (title) { await addDoc('lessons', { title, course, video, pdf, live: false });
                    closeModal();
                    renderLessons(); }
            };
            window.showAssignmentForm = () => {
                const modal = document.getElementById('genericModal');
                document.getElementById('genericModalContent').innerHTML = `
                    <h3>واجب جديد</h3>
                    <div class="form-group"><input id="aImage" placeholder="رابط صورة السؤال"> <button class="btn btn-sm" onclick="uploadFile('image',['png','jpg'],url=>document.getElementById('aImage').value=url)">رفع صورة</button></div>
                    <div class="form-group"><textarea id="aDesc" placeholder="وصف السؤال"></textarea></div>
                    <div class="form-group"><select id="aLesson"></select></div>
                    <div class="form-group"><select id="aType" onchange="document.getElementById('aCorrectGroup').style.display=this.value==='essay'?'none':'block'"><option value="essay">مقالي</option><option value="mcq">اختيار من متعدد</option><option value="truefalse">صح/خطأ</option></select></div>
                    <div class="form-group" id="aCorrectGroup"><input id="aCorrect" placeholder="الإجابة الصحيحة"></div>
                    <button class="btn btn-primary" onclick="saveAssignment()">حفظ</button>
                `;
                getCollection('lessons').then(lessons => {
                    document.getElementById('aLesson').innerHTML = lessons.map(l => `<option>${l.title}</option>`).join('');
                });
                modal.classList.add('active');
            };
            window.saveAssignment = async () => {
                const image = document.getElementById('aImage').value;
                const desc = document.getElementById('aDesc').value;
                const lesson = document.getElementById('aLesson').value;
                const type = document.getElementById('aType').value;
                const correct = document.getElementById('aCorrect')?.value || '';
                await addDoc('assignments', { image, desc, lesson, type, correct, solutions: 0 });
                closeModal();
                renderAssignments();
            };
            window.showExamForm = () => {
                const modal = document.getElementById('genericModal');
                document.getElementById('genericModalContent').innerHTML = `
                    <h3>امتحان جديد</h3>
                    <div class="form-group"><input id="eName" placeholder="اسم الامتحان"></div>
                    <div class="form-group"><input type="number" id="eTime" placeholder="الزمن بالدقائق"></div>
                    <button class="btn btn-primary" onclick="saveExam()">حفظ</button>
                `;
                modal.classList.add('active');
            };
            window.saveExam = async () => {
                const name = document.getElementById('eName').value;
                const time = document.getElementById('eTime').value;
                if (name) { await addDoc('exams', { name, time, questions: 0, showAnswer: false });
                    closeModal();
                    renderExams(); }
            };

            function closeModal() { document.getElementById('genericModal').classList.remove('active'); }
            window.closeModal = closeModal;

            async function refreshTab() {
                switch (currentTab) {
                    case 'dashboard': renderDashboard(); break;
                    case 'students': renderStudents(); break;
                    case 'grades': renderGrades(); break;
                    case 'courses': renderCourses(); break;
                    case 'lessons': renderLessons(); break;
                    case 'assignments': renderAssignments(); break;
                    case 'exams': renderExams(); break;
                    case 'questions': renderQuestions(); break;
                    case 'settings': renderSettings(); break;
                }
            }

            function initDashboard() {
                document.querySelectorAll('.sidebar nav a').forEach(a => {
                    a.addEventListener('click', e => {
                        e.preventDefault();
                        document.querySelectorAll('.sidebar nav a').forEach(x => x.classList.remove('active'));
                        a.classList.add('active');
                        currentTab = a.dataset.tab;
                        document.getElementById('tabTitle').textContent = a.textContent.trim();
                        refreshTab();
                    });
                });
                document.getElementById('menuToggle').addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('open');
                });
                refreshTab();
                // load logo
                db.collection('settings').doc('platform').get().then(doc => {
                    if (doc.exists && doc.data().logo) {
                        document.getElementById('sidebarLogoPreview').innerHTML = `<img src="${doc.data().logo}" style="width:100%;height:100%;object-fit:cover;border-radius:14px;">`;
                    }
                });
            }
        })();
    </script>
</body>
</html>

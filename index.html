<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن | مستر عبدالله خليل</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
    <style>
        :root {
            --bg-deep: #020012; --glass-bg: rgba(255,255,255,0.03); --glass-border: rgba(255,255,255,0.06);
            --glass-hover: rgba(255,255,255,0.05); --text-primary: #f0f0f7; --text-secondary: #b8b8d4;
            --text-muted: #6e6e90; --accent-gradient: linear-gradient(135deg, #4da8da, #7c5ce7, #22d3bb);
            --accent-2: #7c5ce7; --accent-3: #22d3bb; --danger: #ef4444; --radius-lg: 24px; --radius-md: 16px;
            --font: 'Cairo', sans-serif; --transition: 0.3s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font); background:var(--bg-deep); color:var(--text-primary); display:flex; min-height:100vh; }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .fade-in-up { animation: fadeInUp 0.5s ease both; }
        .aurora { position:fixed; inset:0; pointer-events:none; z-index:0; }
        .aurora .orb { position:absolute; border-radius:50%; filter:blur(140px); opacity:0.13; animation:auroraFloat 22s infinite ease-in-out; }
        .aurora .orb:nth-child(1){ width:700px; height:700px; background:#4da8da; top:-250px; left:-200px; }
        .aurora .orb:nth-child(2){ width:550px; height:550px; background:#7c5ce7; bottom:-200px; right:-180px; animation-delay:-10s; }
        @keyframes auroraFloat { 0%,100%{transform:translate(0,0) scale(1);} 33%{transform:translate(50px,-40px) scale(1.1);} 66%{transform:translate(-40px,50px) scale(0.9);} }
        .sidebar { width:260px; background:rgba(8,8,28,0.75); backdrop-filter:blur(35px); border-left:1px solid var(--glass-border); padding:24px 14px; flex-shrink:0; z-index:50; overflow-y:auto; transition:transform 0.4s; }
        .sidebar .logo-icon { width:42px; height:42px; border-radius:14px; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; margin-bottom:20px; overflow:hidden; }
        .sidebar .logo-icon img { width:100%; height:100%; object-fit:cover; border-radius:inherit; }
        .sidebar nav a { display:block; padding:10px 14px; border-radius:24px; color:var(--text-muted); text-decoration:none; font-size:0.88rem; margin-bottom:4px; cursor:pointer; transition:0.2s; }
        .sidebar nav a.active, .sidebar nav a:hover { background:rgba(255,255,255,0.05); color:#fff; }
        .main { flex:1; overflow-y:auto; max-height:100vh; position:relative; z-index:5; }
        .topbar { padding:14px 24px; display:flex; justify-content:space-between; align-items:center; background:rgba(6,6,26,0.7); backdrop-filter:blur(25px); border-bottom:1px solid var(--glass-border); position:sticky; top:0; z-index:20; }
        .topbar h2 { background:var(--accent-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .btn { padding:8px 16px; border-radius:24px; font-weight:600; font-size:0.8rem; border:1.5px solid var(--glass-border); background:transparent; color:var(--text-primary); cursor:pointer; transition:0.2s; display:inline-flex; align-items:center; gap:6px; text-decoration:none; }
        .btn:hover { background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.2); }
        .btn-primary { background:var(--accent-gradient); border:none; color:#fff; }
        .btn-danger { background:rgba(239,68,68,0.2); border-color:rgba(239,68,68,0.4); color:#f87171; }
        .btn-sm { padding:5px 10px; font-size:0.7rem; }
        .content { padding:24px; }
        .card { background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:var(--radius-lg); padding:20px; backdrop-filter:blur(15px); margin-bottom:20px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:0.85rem; margin-bottom:6px; color:var(--text-secondary); }
        .form-group input, .form-group select, .form-group textarea { width:100%; padding:10px 14px; border-radius:30px; border:1.5px solid var(--glass-border); background:rgba(255,255,255,0.04); color:#fff; font-family:var(--font); font-size:0.9rem; outline:none; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--accent-2); }
        table { width:100%; border-collapse:collapse; font-size:0.82rem; }
        th, td { padding:10px 12px; text-align:right; border-bottom:1px solid rgba(255,255,255,0.04); }
        th { color:var(--text-muted); font-weight:600; font-size:0.7rem; }
        .badge { padding:4px 10px; border-radius:14px; font-size:0.7rem; font-weight:600; display:inline-block; }
        .badge-success { background:rgba(34,211,187,0.2); color:#22d3bb; }
        .badge-warning { background:rgba(251,191,36,0.2); color:#fbbf24; }
        .badge-danger { background:rgba(239,68,68,0.2); color:#f87171; }
        .question-block { background:rgba(255,255,255,0.02); border:1px solid var(--glass-border); border-radius:var(--radius-md); padding:14px; margin:10px 0; }
        .options-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        @media (max-width:768px) { .sidebar { position:fixed; right:-280px; top:0; bottom:0; z-index:55; } .sidebar.open { right:0; } }
        .menu-toggle { display:none; background:none; border:none; color:#fff; font-size:1.6rem; cursor:pointer; }
        @media (max-width:768px) { .menu-toggle { display:block; } }
        .btn-whatsapp { background:#25D366; color:#fff; border:none; }
        .btn-whatsapp:hover { background:#1da851; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="aurora"><div class="orb"></div><div class="orb"></div></div>
<div class="overlay" id="overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:40;"></div>

<aside class="sidebar" id="sidebar">
    <div class="logo-icon" id="sidebarLogo">ع</div>
    <nav>
        <a class="active" data-tab="students">👥 الطلاب</a>
        <a data-tab="groups">👨‍👩‍👧‍👦 المجموعات</a>
        <a data-tab="assignments">📄 الواجبات</a>
        <a data-tab="exams">📝 الامتحانات</a>
        <a data-tab="schedules">📅 جداول الحصص</a>
        <a data-tab="notifications">🔔 الإشعارات</a>
        <a data-tab="questions">💬 الأسئلة</a>
        <a data-tab="settings">⚙️ الإعدادات</a>
    </nav>
</aside>

<div class="main">
    <div class="topbar">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <h2>📊 لوحة التحكم</h2>
        <a href="index.html" class="btn">الموقع</a>
    </div>
    <div class="content" id="adminContent">
        <div class="card"><p>⏳ جاري التحميل...</p></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDT0xGqGHzyyeB4qcz5AGMKxESCGZNNEWE",
        authDomain: "abdullah-khalil.firebaseapp.com",
        projectId: "abdullah-khalil",
        storageBucket: "abdullah-khalil.firebasestorage.app",
        messagingSenderId: "530661483867",
        appId: "1:530661483867:web:e2f165e9f808bcfcb8267e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const CLOUDINARY_CLOUD = "deaevfmvm", CLOUDINARY_PRESET = "ml_default", CLOUDINARY_KEY = "864215656447737";

    const container = document.getElementById('adminContent');
    const sidebarLinks = document.querySelectorAll('.sidebar nav a');

    async function loadLogo() {
        const doc = await db.collection('settings').doc('platform').get().catch(() => null);
        if (doc && doc.exists && doc.data().logo) {
            document.getElementById('sidebarLogo').innerHTML = `<img src="${doc.data().logo}" alt="لوجو">`;
        }
    }
    loadLogo();

    sidebarLinks.forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            sidebarLinks.forEach(l => l.classList.remove('active'));
            link.classList.add('active');
            loadTab(link.dataset.tab);
        });
    });

    function loadTab(tab) {
        switch(tab) {
            case 'students': renderStudents(); break;
            case 'groups': renderGroups(); break;
            case 'assignments': renderAssignments(); break;
            case 'exams': renderExams(); break;
            case 'schedules': renderSchedules(); break;
            case 'notifications': renderNotifications(); break;
            case 'questions': renderQuestions(); break;
            case 'settings': renderSettings(); break;
        }
    }

    async function populateGroupSelect(selectId, grade, selectedGroupId = null) {
        const select = document.getElementById(selectId);
        if (!select) return;
        select.innerHTML = '<option value="">اختر مجموعة (اختياري)</option>';
        if (grade) {
            const snap = await db.collection('groups').where('grade','==',grade).get().catch(() => ({ empty: true, docs: [] }));
            if (!snap.empty) {
                snap.forEach(doc => {
                    select.innerHTML += `<option value="${doc.id}" ${selectedGroupId===doc.id?'selected':''}>${doc.data().name}</option>`;
                });
            }
        }
    }

    // ========== الطلاب ==========
    async function renderStudents() {
        const snap = await db.collection('students').get();
        let html = `<div class="card fade-in-up"><h3>👥 الطلاب (${snap.size})</h3>
        <select id="studentFilter" onchange="filterStudents()" style="margin:12px 0; padding:8px; border-radius:20px; background:rgba(255,255,255,0.04); border:1px solid var(--glass-border); color:#fff;">
            <option value="">الكل</option><option>قيد المراجعة</option><option>مفعل</option><option>محظور</option>
        </select>
        <div style="overflow-x:auto;"><table><thead><tr><th>الاسم</th><th>الصف</th><th>الهاتف</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>`;
        snap.forEach(doc => {
            const s = doc.data();
            html += `<tr><td>${s.name||''}</td><td>${s.grade||''}</td><td>${s.phone||''}</td>
            <td><span class="badge ${s.status==='مفعل'?'badge-success':s.status==='محظور'?'badge-danger':'badge-warning'}">${s.status||'قيد المراجعة'}</span></td>
            <td>
                <button class="btn btn-sm" onclick="viewStudentDetails('${doc.id}')">📋 تفاصيل</button>
                <button class="btn btn-sm" onclick="window.updateStudent('${doc.id}','مفعل')">تفعيل</button>
                <button class="btn btn-sm btn-danger" onclick="window.updateStudent('${doc.id}','محظور')">حظر</button>
            </td></tr>`;
        });
        html += '</tbody></table></div></div>';
        container.innerHTML = html;
    }
    window.updateStudent = async (id, status) => { await db.collection('students').doc(id).update({status}); renderStudents(); };

    // ✅ تفاصيل الطالب الشاملة (برسوم بيانية + واتساب)
    window.viewStudentDetails = async (studentId) => {
        const studentDoc = await db.collection('students').doc(studentId).get();
        if (!studentDoc.exists) { alert('الطالب غير موجود'); return; }
        const student = studentDoc.data();

        let groupName = '—';
        const groupsSnap = await db.collection('groups').where('grade','==',student.grade).get().catch(() => ({ empty: true, docs: [] }));
        if (!groupsSnap.empty) {
            for (const gDoc of groupsSnap.docs) {
                if (gDoc.data().students?.includes(studentId)) { groupName = gDoc.data().name; break; }
            }
        }

        const allAssignments = [];
        const assignSnap = await db.collection('assignments').where('grade','==',student.grade).get().catch(() => ({ empty: true, docs: [] }));
        if (!assignSnap.empty) assignSnap.forEach(doc => allAssignments.push({id: doc.id, ...doc.data()}));

        const submissionsSnap = await db.collection('assignmentSubmissions').where('studentId','==',studentId).get().catch(() => ({ empty: true, docs: [] }));
        const submissions = {};
        if (!submissionsSnap.empty) submissionsSnap.forEach(doc => { const s = doc.data(); submissions[s.assignmentId] = {id: doc.id, ...s}; });

        const examResultsSnap = await db.collection('examResults').where('studentId','==',studentId).orderBy('createdAt','desc').get().catch(() => ({ empty: true, docs: [] }));
        const examResults = [];
        if (!examResultsSnap.empty) examResultsSnap.forEach(doc => examResults.push({id: doc.id, ...doc.data()}));

        const avgScore = examResults.length ? Math.round(examResults.reduce((a,b)=>a+(b.percentage||0),0)/examResults.length) : 0;
        const assignCount = Object.values(submissions).filter(s => s.score !== undefined).length;

        const lastThreeAssign = allAssignments.slice(-3).map(a => {
            const sub = submissions[a.id];
            return `${a.title}: ${sub?.score ?? 'لم يسلم'}`;
        }).join('\n');
        const lastThreeExams = examResults.slice(-3).map(r => `${r.examName}: ${r.percentage||0}%`).join('\n');
        const whatsappMsg = `👤 تقرير الطالب: ${student.name}\n📚 الصف: ${student.grade}\n📊 متوسط الدرجات: ${avgScore}%\n✅ الواجبات المسلّمة: ${assignCount}\n\n📝 آخر 3 واجبات:\n${lastThreeAssign}\n\n📋 آخر 3 امتحانات:\n${lastThreeExams}\n\n📞 للتواصل: ${student.parentPhone||'غير متوفر'}`;
        const waUrl = `https://wa.me/${student.parentPhone||''}?text=${encodeURIComponent(whatsappMsg)}`;

        let html = `<div class="card fade-in-up"><h3>📋 تفاصيل الطالب: ${student.name}</h3>
        <p><strong>الصف:</strong> ${student.grade} | <strong>المجموعة:</strong> ${groupName}</p>
        <p><strong>الهاتف:</strong> ${student.phone||'—'} | <strong>ولي الأمر:</strong> ${student.parentPhone||'—'}</p>
        <p><strong>البريد:</strong> ${student.email||'—'} | <strong>الحالة:</strong> <span class="badge ${student.status==='مفعل'?'badge-success':'badge-warning'}">${student.status}</span></p>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin:10px 0;">
            <button class="btn" onclick="renderStudents()">رجوع للقائمة</button>
            <a href="${waUrl}" target="_blank" class="btn btn-whatsapp">💬 واتساب ولي الأمر</a>
        </div></div>`;

        html += `<div class="card fade-in-up"><h3>📊 ملخص التقدم</h3>
        <div style="display:flex; gap:30px; justify-content:center; flex-wrap:wrap;">
            <div style="text-align:center;"><svg width="90" height="90" viewBox="0 0 36 36" style="transform:rotate(-90deg);"><circle cx="18" cy="18" r="15.5" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2.5"/><circle cx="18" cy="18" r="15.5" fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-dasharray="${avgScore},100" stroke-linecap="round"/><defs><linearGradient id="g1"><stop offset="0%" stop-color="#4da8da"/><stop offset="100%" stop-color="#22d3bb"/></linearGradient></defs></svg><div style="font-size:1.3rem;font-weight:800;">${avgScore}%</div><div style="color:var(--text-muted);">متوسط الدرجات</div></div>
            <div style="text-align:center;"><svg width="90" height="90" viewBox="0 0 36 36" style="transform:rotate(-90deg);"><circle cx="18" cy="18" r="15.5" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2.5"/><circle cx="18" cy="18" r="15.5" fill="none" stroke="#7c5ce7" stroke-width="2.5" stroke-dasharray="${Math.min((assignCount/15)*100,100)},100" stroke-linecap="round"/></svg><div style="font-size:1.3rem;font-weight:800;">${assignCount}</div><div style="color:var(--text-muted);">واجبات مصححة</div></div>
            <div style="text-align:center;"><svg width="90" height="90" viewBox="0 0 36 36" style="transform:rotate(-90deg);"><circle cx="18" cy="18" r="15.5" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2.5"/><circle cx="18" cy="18" r="15.5" fill="none" stroke="#f472b6" stroke-width="2.5" stroke-dasharray="${Math.min((examResults.length/10)*100,100)},100" stroke-linecap="round"/></svg><div style="font-size:1.3rem;font-weight:800;">${examResults.length}</div><div style="color:var(--text-muted);">امتحانات</div></div>
        </div></div>`;

        html += `<div class="card fade-in-up"><h3>📄 الواجبات</h3><table><thead><tr><th>الواجب</th><th>الحالة</th><th>الدرجة</th></tr></thead><tbody>`;
        allAssignments.forEach(a => {
            const sub = submissions[a.id];
            html += `<tr><td>${a.title||'—'}</td><td>${sub ? (sub.score!==undefined ? '✅ مصحح' : '⏳ مسلّم') : '❌ لم يسلم'}</td><td>${sub?.score ?? '—'}</td></tr>`;
        });
        html += '</tbody></table></div>';

        html += `<div class="card fade-in-up"><h3>📝 الامتحانات</h3><table><thead><tr><th>الامتحان</th><th>المحاولة</th><th>الدرجة</th><th>النسبة</th></tr></thead><tbody>`;
        examResults.forEach(r => {
            html += `<tr><td>${r.examName||''}</td><td>${r.attempt||1}</td><td>${r.score||0}/${r.total||0}</td><td>${r.percentage||0}%</td></tr>`;
        });
        html += '</tbody></table></div>';

        container.innerHTML = html;
    };

    // ========== المجموعات ==========
    async function renderGroups() {
        const snap = await db.collection('groups').get();
        let html = `<div class="card fade-in-up"><h3>👨‍👩‍👧‍👦 المجموعات</h3>
        <button class="btn btn-primary" onclick="window.showAddGroup()">➕ إنشاء مجموعة</button>
        <div id="addGroupForm" style="display:none; margin-top:12px;">
            <input id="groupName" placeholder="اسم المجموعة" style="width:100%; padding:8px; border-radius:20px; background:rgba(255,255,255,0.04); border:1px solid var(--glass-border); color:#fff; margin-bottom:8px;">
            <select id="groupGrade" style="width:100%; padding:8px; border-radius:20px; background:rgba(255,255,255,0.04); border:1px solid var(--glass-border); color:#fff; margin-bottom:8px;">
                <option value="">اختر الصف</option><option>الأول الإعدادي</option><option>الثاني الإعدادي</option><option>الثالث الإعدادي</option><option>الأول الثانوي</option><option>الثاني الثانوي</option><option>الثالث الثانوي</option>
            </select>
            <button class="btn btn-primary" onclick="window.addGroup()">حفظ</button>
        </div></div>`;
        html += '<div class="card fade-in-up"><div style="overflow-x:auto;"><table><thead><tr><th>المجموعة</th><th>الصف</th><th>الطلاب</th><th>إجراءات</th></tr></thead><tbody>';
        snap.forEach(doc => {
            const g = doc.data();
            html += `<tr><td>${g.name}</td><td>${g.grade}</td><td>${g.students?.length||0}</td>
            <td><button class="btn btn-sm" onclick="window.manageGroupStudents('${doc.id}')">إدارة الطلاب</button>
            <button class="btn btn-sm btn-danger" onclick="window.deleteGroup('${doc.id}')">حذف</button></td></tr>`;
        });
        html += '</tbody></table></div></div>';
        container.innerHTML = html;
    }
    window.showAddGroup = () => document.getElementById('addGroupForm').style.display = 'block';
    window.addGroup = async () => {
        const name = document.getElementById('groupName').value, grade = document.getElementById('groupGrade').value;
        if(!name||!grade) return alert('أكمل');
        await db.collection('groups').add({name, grade, students: []});
        renderGroups();
    };
    window.deleteGroup = async id => { if(confirm('حذف؟')) { await db.collection('groups').doc(id).delete(); renderGroups(); } };
    window.manageGroupStudents = async (groupId) => {
        const groupDoc = await db.collection('groups').doc(groupId).get();
        const group = groupDoc.data();
        const allStudents = await db.collection('students').where('grade','==',group.grade).get();
        let html = `<div class="card fade-in-up"><h3>إدارة طلاب مجموعة ${group.name}</h3>`;
        allStudents.forEach(doc => {
            const s = doc.data();
            const inGroup = group.students?.includes(doc.id);
            html += `<div style="display:flex; justify-content:space-between; padding:6px 0;">${s.name}
            <button class="btn btn-sm ${inGroup?'btn-danger':'btn-primary'}" onclick="window.toggleStudentInGroup('${groupId}','${doc.id}',${!inGroup})">${inGroup?'إزالة':'إضافة'}</button></div>`;
        });
        html += '<button class="btn" onclick="renderGroups()">رجوع</button></div>';
        container.innerHTML = html;
    };
    // ✅ تقييد الطالب بمجموعة واحدة
    window.toggleStudentInGroup = async (groupId, studentId, add) => {
        const ref = db.collection('groups').doc(groupId);
        if (add) {
            const groupDoc = await ref.get();
            const grade = groupDoc.data().grade;
            const allGroups = await db.collection('groups').where('grade','==',grade).get();
            const batch = db.batch();
            allGroups.forEach(gDoc => {
                if (gDoc.data().students?.includes(studentId)) {
                    batch.update(gDoc.ref, { students: firebase.firestore.FieldValue.arrayRemove(studentId) });
                }
            });
            batch.update(ref, { students: firebase.firestore.FieldValue.arrayUnion(studentId) });
            await batch.commit();
        } else {
            await ref.update({ students: firebase.firestore.FieldValue.arrayRemove(studentId) });
        }
        window.manageGroupStudents(groupId);
    };

    // ========== الواجبات ==========
    async function renderAssignments() {
        const snap = await db.collection('assignments').get();
        let html = `<div class="card fade-in-up"><h3>📄 الواجبات</h3><button class="btn btn-primary" onclick="window.showAddAssignment()">➕ إنشاء واجب</button></div>`;
        html += '<div class="card fade-in-up"><div style="overflow-x:auto;"><table><thead><tr><th>العنوان</th><th>الصف</th><th>المجموعة</th><th>الصور</th><th>إجراءات</th></tr></thead><tbody>';
        for (const doc of snap.docs) {
            const a = doc.data();
            let groupName = '—';
            if(a.groupId) {
                const gDoc = await db.collection('groups').doc(a.groupId).get().catch(() => null);
                if(gDoc && gDoc.exists) groupName = gDoc.data().name;
            }
            html += `<tr><td>${a.title||''}</td><td>${a.grade}</td><td>${groupName}</td><td>${a.images?.length||0}</td>
            <td><button class="btn btn-sm" onclick="window.viewAssignmentSubmissions('${doc.id}')">تسليمات</button>
            <button class="btn btn-sm btn-danger" onclick="window.deleteAssignment('${doc.id}')">حذف</button></td></tr>`;
        }
        html += '</tbody></table></div></div>';
        container.innerHTML = html;
    }
    // ... (باقي دوال الواجبات كما هي)

    // ========== الامتحانات ==========
    async function renderExams() {
        const snap = await db.collection('exams').get();
        let html = `<div class="card fade-in-up"><h3>📝 الامتحانات</h3><button class="btn btn-primary" onclick="window.showAddExam()">➕ إنشاء امتحان</button></div>`;
        html += '<div class="card fade-in-up"><div style="overflow-x:auto;"><table><thead><tr><th>الاسم</th><th>الصف</th><th>الزمن</th><th>الأسئلة</th><th>نتائج</th></tr></thead><tbody>';
        snap.forEach(doc => {
            const e = doc.data();
            html += `<tr><td>${e.name}</td><td>${e.grade}</td><td>${e.time} دقيقة</td><td>${e.questions?.length||0}</td>
            <td>
                <button class="btn btn-sm" onclick="window.viewExamResults('${doc.id}')">عرض النتائج</button>
                <button class="btn btn-sm btn-danger" onclick="window.deleteExam('${doc.id}')">حذف</button>
            </td></tr>`;
        });
        html += '</tbody></table></div></div>';
        container.innerHTML = html;
    }
    // ✅ عرض نتائج الامتحان مرتبة مع الراسبين
    window.viewExamResults = async (examId) => {
        const examDoc = await db.collection('exams').doc(examId).get();
        const exam = examDoc.data();
        const resultsSnap = await db.collection('examResults').where('examId','==',examId).get();
        const results = [];
        resultsSnap.forEach(doc => results.push({ id: doc.id, ...doc.data() }));
        results.sort((a, b) => {
            if (a.reason === 'تم الخروج من الامتحان' && b.reason !== 'تم الخروج من الامتحان') return 1;
            if (a.reason !== 'تم الخروج من الامتحان' && b.reason === 'تم الخروج من الامتحان') return -1;
            return (b.percentage||0) - (a.percentage||0);
        });
        let html = `<div class="card fade-in-up"><h3>📊 نتائج امتحان: ${exam.name}</h3><button class="btn" onclick="renderExams()">رجوع</button><br><br>
        <table><thead><tr><th>#</th><th>الطالب</th><th>المحاولة</th><th>الدرجة</th><th>النسبة</th><th>سبب التسليم</th></tr></thead><tbody>`;
        results.forEach((r, i) => {
            const isCheater = r.reason === 'تم الخروج من الامتحان';
            html += `<tr style="${isCheater?'background:rgba(239,68,68,0.1);':''}">
                <td>${i+1}</td><td>${r.studentId?.substring(0,8)||'—'}</td><td>${r.attempt||1}</td>
                <td>${r.score||0}/${r.total||0}</td>
                <td><span class="badge ${isCheater?'badge-danger':(r.percentage>=85?'badge-success':'badge-warning')}">${r.percentage||0}% ${isCheater?'⚠️':''}</span></td>
                <td>${r.reason||'—'}</td></tr>`;
        });
        html += '</tbody></table></div>';
        container.innerHTML = html;
    };
    // ... (باقي دوال الامتحانات كما هي)
    window.showAddExam = () => { /* ... */ };
    window.addExamQuestion = () => { /* ... */ };
    window.saveExam = async () => { /* ... */ };
    window.deleteExam = async id => { /* ... */ };

    // ========== جداول الحصص ==========
    async function renderSchedules() {
        const snap = await db.collection('schedules').get();
        let html = `<div class="card fade-in-up"><h3>📅 جداول الحصص</h3><button class="btn btn-primary" onclick="window.showAddSchedule()">➕ إضافة جدول</button></div>`;
        html += '<div class="card fade-in-up"><div style="overflow-x:auto;"><table><thead><tr><th>الصف</th><th>المجموعة</th><th>الصورة</th><th>إجراءات</th></tr></thead><tbody>';
        for (const doc of snap.docs) {
            const s = doc.data();
            let groupName = 'عام';
            if(s.groupId) {
                const gDoc = await db.collection('groups').doc(s.groupId).get().catch(() => null);
                if(gDoc && gDoc.exists) groupName = gDoc.data().name;
            }
            html += `<tr><td>${s.grade}</td><td>${groupName}</td><td><img src="${s.image}" style="width:60px;"></td><td><button class="btn btn-sm btn-danger" onclick="window.deleteSchedule('${doc.id}')">حذف</button></td></tr>`;
        }
        html += '</tbody></table></div></div>';
        container.innerHTML = html;
    }
    window.showAddSchedule = () => {
        container.innerHTML = `<div class="card fade-in-up"><h3>إضافة جدول حصص</h3>
        <select id="schedGrade" onchange="window.onSchedGradeChange()"><option value="">اختر الصف</option><option>الأول الإعدادي</option><option>الثاني الإعدادي</option><option>الثالث الإعدادي</option><option>الأول الثانوي</option><option>الثاني الثانوي</option><option>الثالث الثانوي</option></select><br><br>
        <select id="schedGroup"><option value="">اختر مجموعة (اختياري)</option></select><br><br>
        <button class="btn" onclick="window.uploadScheduleImage()">📷 رفع صورة الجدول</button>
        <input type="hidden" id="schedImage"><div id="schedPreview"></div><br><br>
        <button class="btn btn-primary" onclick="window.saveSchedule()">حفظ</button></div>`;
    };
    window.onSchedGradeChange = async () => {
        const grade = document.getElementById('schedGrade').value;
        await populateGroupSelect('schedGroup', grade);
    };
    // ✅ إصلاح رفع صورة الجدول
    window.uploadScheduleImage = () => {
        window.cloudinary.openUploadWidget({
            cloudName: CLOUDINARY_CLOUD, uploadPreset: CLOUDINARY_PRESET, apiKey: CLOUDINARY_KEY,
            sources: ['local','camera','url'], multiple: false, resourceType: 'image',
            clientAllowedFormats: ['png','jpg','jpeg','gif'], maxFileSize: 10000000, language: 'ar'
        }, (error, result) => {
            if (error) { alert('❌ فشل رفع الصورة'); return; }
            if (result && result.event === 'success') {
                document.getElementById('schedImage').value = result.info.secure_url;
                document.getElementById('schedPreview').innerHTML = `<img src="${result.info.secure_url}" style="max-width:200px; border-radius:12px;">`;
            }
        });
    };
    window.saveSchedule = async () => {
        const grade = document.getElementById('schedGrade')?.value;
        const groupId = document.getElementById('schedGroup')?.value || null;
        const image = document.getElementById('schedImage')?.value;
        if(!grade || !image) return alert('أكمل');
        await db.collection('schedules').add({grade, groupId, image, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
        renderSchedules();
    };
    window.deleteSchedule = async id => { if(confirm('حذف؟')) { await db.collection('schedules').doc(id).delete(); renderSchedules(); } };

    document.getElementById('menuToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
    });
    document.getElementById('overlay').addEventListener('click', () => {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').style.display = 'none';
    });

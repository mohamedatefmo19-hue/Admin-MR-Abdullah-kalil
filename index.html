<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>لوحة الإدارة - منصة عبدالله خليل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <!-- Cloudinary -->
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <!-- OneSignal -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <style>
        :root {
            --primary: #2563EB;
            --primary-light: #3B82F6;
            --secondary: #14B8A6;
            --accent: #38BDF8;
            --bg: #F5F7FB;
            --cards: #FFFFFF;
            --text: #1E293B;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            --border: #E2E8F0;
            --radius: 16px;
            --radius-sm: 12px;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-blur: blur(20px);
            --shadow: 0 4px 16px rgba(0,0,0,0.04);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.06);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark-mode {
            --bg: #0F172A;
            --cards: #1E293B;
            --text: #F1F5F9;
            --text-secondary: #CBD5E1;
            --text-muted: #64748B;
            --border: #334155;
            --glass-bg: rgba(30, 41, 59, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 4px 16px rgba(0,0,0,0.25);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.35);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;font-size:16px;}
        body{
            font-family:'Cairo',sans-serif;
            background:var(--bg);
            color:var(--text);
            display:flex;
            min-height:100vh;
            transition:background 0.4s,color 0.4s;
            -webkit-tap-highlight-color:transparent;
            overflow-x:hidden;
        }
        /* Aurora background */
        .aurora-bg{position:fixed;inset:0;pointer-events:none;z-index:-1;overflow:hidden;}
        .aurora-blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.15;animation:auroraFloat 20s ease-in-out infinite;}
        .aurora-blob:nth-child(1){width:500px;height:500px;background:#2563EB;top:-200px;left:-100px;}
        .aurora-blob:nth-child(2){width:400px;height:400px;background:#14B8A6;bottom:-150px;right:-80px;animation-delay:-7s;}
        .aurora-blob:nth-child(3){width:350px;height:350px;background:#38BDF8;top:40%;left:50%;animation-delay:-14s;}
        @keyframes auroraFloat{0%,100%{transform:translate(0,0) scale(1);}25%{transform:translate(50px,-30px) scale(1.1);}50%{transform:translate(-30px,40px) scale(0.9);}75%{transform:translate(-50px,-20px) scale(1.05);}}

        /* Sidebar */
        .sidebar{
            width:280px;
            background:var(--glass-bg);
            backdrop-filter:var(--glass-blur);
            -webkit-backdrop-filter:var(--glass-blur);
            border-left:1px solid var(--glass-border);
            padding:24px 16px;
            display:flex;
            flex-direction:column;
            position:fixed;
            height:100vh;
            right:0;
            top:0;
            z-index:100;
            box-shadow:var(--shadow-lg);
            transition:transform var(--transition);
        }
        .sidebar-header{display:flex;align-items:center;gap:12px;margin-bottom:30px;}
        .sidebar-logo{width:44px;height:44px;border-radius:14px;overflow:hidden;background:var(--cards);}
        .sidebar-logo img{width:100%;height:100%;object-fit:contain;}
        .sidebar-title{font-weight:800;font-size:1.1rem;}
        .sidebar-subtitle{font-size:0.7rem;color:var(--text-muted);}
        .nav-menu{list-style:none;flex:1;overflow-y:auto;}
        .nav-item{margin-bottom:4px;}
        .nav-item a{
            display:flex;align-items:center;gap:10px;padding:10px 14px;
            border-radius:var(--radius-sm);color:var(--text-secondary);
            text-decoration:none;font-weight:600;font-size:0.9rem;
            transition:all var(--transition);
        }
        .nav-item a:hover,.nav-item a.active{
            background:rgba(37,99,235,0.08);color:var(--primary);
        }
        .sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid var(--border);}

        /* Main Content */
        .main-content{
            flex:1;margin-right:280px;padding:20px;
            transition:margin var(--transition);
        }
        .top-bar{
            display:flex;justify-content:space-between;align-items:center;
            margin-bottom:24px;flex-wrap:wrap;gap:12px;
        }
        .page-title{font-size:1.6rem;font-weight:800;}
        .card{
            background:var(--cards);border-radius:var(--radius);
            padding:20px;border:1px solid var(--border);
            box-shadow:var(--shadow);transition:all var(--transition);
            margin-bottom:16px;
        }
        .card:hover{box-shadow:var(--shadow-lg);}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;}
        .stat-card{text-align:center;padding:24px 16px;}
        .stat-number{font-size:2.2rem;font-weight:900;color:var(--primary);}
        .stat-label{font-size:0.85rem;color:var(--text-secondary);}
        input,select,textarea{
            width:100%;padding:10px 14px;border:1px solid var(--border);
            border-radius:var(--radius-sm);font-size:0.85rem;
            background:var(--bg);color:var(--text);font-family:inherit;
            margin:8px 0;transition:border var(--transition);
        }
        input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
        .btn{
            display:inline-flex;align-items:center;gap:6px;
            padding:10px 18px;border-radius:var(--radius-sm);
            font-weight:700;font-size:0.85rem;border:none;cursor:pointer;
            text-decoration:none;transition:all var(--transition);
            background:var(--primary);color:#fff;
        }
        .btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary);}
        .btn-danger{background:#EF4444;color:#fff;}
        .btn:hover{transform:translateY(-2px);opacity:0.9;}
        .badge{
            display:inline-block;padding:4px 10px;border-radius:20px;
            font-size:0.7rem;font-weight:700;
        }
        .badge-active{background:#D1FAE5;color:#065F46;}
        .badge-pending{background:#FEF3C7;color:#92400E;}
        .badge-blocked{background:#FEE2E2;color:#991B1B;}
        .notification-bar{
            background:linear-gradient(90deg,var(--primary),var(--secondary));
            color:white;padding:10px 20px;border-radius:var(--radius-sm);
            margin-bottom:20px;overflow:hidden;white-space:nowrap;
            font-weight:600;font-size:0.9rem;
        }
        .table-responsive{overflow-x:auto;}
        table{width:100%;border-collapse:collapse;font-size:0.8rem;}
        th,td{border:1px solid var(--border);padding:8px 10px;text-align:center;}

        @media(max-width:768px){
            .sidebar{
                transform:translateX(100%);
                position:fixed;z-index:200;
            }
            .sidebar.open{transform:translateX(0);}
            .main-content{margin-right:0;}
            .hamburger{display:block;position:fixed;top:12px;right:12px;z-index:250;background:var(--cards);border:1px solid var(--border);border-radius:10px;padding:8px;}
        }
        .hamburger{display:none;}
    </style>
</head>
<body>
    <div class="aurora-bg">
        <div class="aurora-blob"></div><div class="aurora-blob"></div><div class="aurora-blob"></div>
    </div>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo" id="sidebarLogo"></div>
            <div>
                <div class="sidebar-title">عبدالله خليل</div>
                <div class="sidebar-subtitle">لوحة الإدارة</div>
            </div>
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="#" class="active" data-page="dashboard">📊 الرئيسية</a></li>
            <li class="nav-item"><a href="#" data-page="students">👥 الطلاب</a></li>
            <li class="nav-item"><a href="#" data-page="grades">📚 الصفوف</a></li>
            <li class="nav-item"><a href="#" data-page="courses">🎓 الكورسات</a></li>
            <li class="nav-item"><a href="#" data-page="lectures">📹 المحاضرات</a></li>
            <li class="nav-item"><a href="#" data-page="exams">📝 الامتحانات</a></li>
            <li class="nav-item"><a href="#" data-page="notifications">🔔 الإشعارات</a></li>
            <li class="nav-item"><a href="#" data-page="payments">💳 المدفوعات</a></li>
            <li class="nav-item"><a href="#" data-page="settings">⚙️ الإعدادات</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="index.html" class="btn btn-outline" style="width:100%;justify-content:center;">العودة للمنصة</a>
        </div>
    </aside>
    <!-- Hamburger -->
    <button class="hamburger" id="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">
        ☰
    </button>
    <!-- Main -->
    <main class="main-content" id="mainContent">
        <!-- Dynamic content injected here -->
    </main>

    <script>
        // Firebase init
        firebase.initializeApp({
            apiKey: "AIzaSyDT0xGqGHzyyeB4qcz5AGMKxESCGZNNEWE",
            authDomain: "abdullah-khalil.firebaseapp.com",
            projectId: "abdullah-khalil",
            storageBucket: "abdullah-khalil.firebasestorage.app",
            appId: "1:530661483867:web:e2f165e9f808bcfcb8267e"
        });
        const db = firebase.firestore();

        // OneSignal
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(function(OneSignal) {
            OneSignal.init({ appId: "os_v2_app_mk6n33aj55ditcmb3n5fpo66rsihml7iabcekj5ofx5anzjsjoli2ulxvakacn4srunaazbtwcvmdzed45erspjkmljiagwpfhyyl5a" });
        });

        // Load settings & logo
        async function loadSettings() {
            const doc = await db.collection('settings').doc('theme').get();
            if (doc.exists) {
                const d = doc.data();
                if (d.primaryColor) document.documentElement.style.setProperty('--primary', d.primaryColor);
                if (d.secondaryColor) document.documentElement.style.setProperty('--secondary', d.secondaryColor);
                if (d.logoURL) {
                    document.getElementById('sidebarLogo').innerHTML = `<img src="${d.logoURL}" alt="Logo">`;
                } else {
                    document.getElementById('sidebarLogo').innerHTML = `<svg viewBox="0 0 100 100"><polygon points="50,5 92,28 92,72 50,95 8,72 8,28" fill="none" stroke="#2563EB" stroke-width="4"/><circle cx="50" cy="50" r="12" fill="#14B8A6"/></svg>`;
                }
            }
        }
        loadSettings();

        // Navigation
        const pages = {
            dashboard: renderDashboard,
            students: renderStudents,
            grades: renderGrades,
            courses: renderCourses,
            lectures: renderLectures,
            exams: renderExams,
            notifications: renderNotifications,
            payments: renderPayments,
            settings: renderSettings,
        };

        async function navigate(page) {
            const content = await pages[page]();
            document.getElementById('mainContent').innerHTML = content;
            document.querySelectorAll('.nav-item a').forEach(a => a.classList.remove('active'));
            document.querySelector(`[data-page="${page}"]`).classList.add('active');
            if (window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
        }

        document.querySelectorAll('.nav-item a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                navigate(this.dataset.page);
            });
        });

        // Default page
        navigate('dashboard');

        // ---------- RENDER FUNCTIONS ----------
        async function renderDashboard() {
            const studentsSnap = await db.collection('students').get();
            const coursesSnap = await db.collection('courses').get();
            const totalStudents = studentsSnap.size;
            const totalCourses = coursesSnap.size;
            let activeStudents = 0;
            studentsSnap.forEach(doc => { if (doc.data().status === 'active') activeStudents++; });
            return `
                <div class="top-bar"><h1 class="page-title">لوحة التحكم</h1></div>
                <div class="grid">
                    <div class="card stat-card"><div class="stat-number">${totalStudents}</div><div class="stat-label">إجمالي الطلاب</div></div>
                    <div class="card stat-card"><div class="stat-number">${activeStudents}</div><div class="stat-label">نشط</div></div>
                    <div class="card stat-card"><div class="stat-number">${totalCourses}</div><div class="stat-label">كورس</div></div>
                    <div class="card stat-card"><div class="stat-number">98%</div><div class="stat-label">رضا</div></div>
                </div>
            `;
        }

        async function renderStudents() {
            const snap = await db.collection('students').get();
            let rows = '';
            snap.forEach(doc => {
                const s = doc.data();
                const statusBadge = s.status === 'active' ? 'badge-active' : s.status === 'blocked' ? 'badge-blocked' : 'badge-pending';
                rows += `<tr>
                    <td>${s.fullName}</td>
                    <td>${s.email}</td>
                    <td><span class="badge ${statusBadge}">${s.status}</span></td>
                    <td>
                        <button class="btn" onclick="updateStudentStatus('${doc.id}','active')" style="padding:4px 8px;font-size:0.7rem;">تفعيل</button>
                        <button class="btn btn-danger" onclick="updateStudentStatus('${doc.id}','blocked')" style="padding:4px 8px;font-size:0.7rem;">حظر</button>
                        <button class="btn btn-outline" onclick="updateStudentStatus('${doc.id}','pending')" style="padding:4px 8px;font-size:0.7rem;">مراجعة</button>
                    </td>
                </tr>`;
            });
            return `
                <div class="top-bar"><h1 class="page-title">إدارة الطلاب</h1></div>
                <input placeholder="بحث عن طالب..." oninput="filterStudents(this.value)" id="studentSearch">
                <div class="table-responsive"><table><thead><tr><th>الاسم</th><th>البريد</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody id="studentsTable">${rows}</tbody></table></div>
            `;
        }

        window.updateStudentStatus = async (id, status) => {
            await db.collection('students').doc(id).update({ status });
            navigate('students');
        };

        async function renderGrades() {
            const snap = await db.collection('grades').get();
            let cards = '';
            snap.forEach(doc => {
                cards += `<div class="card"><strong>${doc.data().name}</strong></div>`;
            });
            return `
                <div class="top-bar"><h1 class="page-title">الصفوف الدراسية</h1></div>
                ${cards}
                <input id="newGradeName" placeholder="اسم الصف">
                <input type="file" id="gradeImage" accept="image/*">
                <button class="btn" onclick="addGrade()">إضافة صف</button>
            `;
        }

        window.addGrade = async () => {
            const name = document.getElementById('newGradeName').value;
            const file = document.getElementById('gradeImage').files[0];
            let imageURL = '';
            if (file) {
                const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', 'ml_default');
                const res = await fetch('https://api.cloudinary.com/v1_1/ml_default/image/upload', { method: 'POST', body: fd });
                const data = await res.json();
                imageURL = data.secure_url;
            }
            await db.collection('grades').add({ name, imageURL });
            navigate('grades');
        };

        async function renderCourses() {
            const gradesSnap = await db.collection('grades').get();
            let options = '';
            gradesSnap.forEach(g => options += `<option value="${g.id}">${g.data().name}</option>`);
            const coursesSnap = await db.collection('courses').get();
            let list = '';
            coursesSnap.forEach(doc => {
                const c = doc.data();
                list += `<div class="card"><strong>${c.title}</strong> (${c.isFree ? 'مجاني' : 'مدفوع'}) ${c.isHidden ? '🔒 مخفي' : ''}</div>`;
            });
            return `
                <div class="top-bar"><h1 class="page-title">الكورسات</h1></div>
                ${list}
                <select id="courseGrade">${options}</select>
                <input id="courseTitle" placeholder="عنوان الكورس">
                <label>مجاني <input type="checkbox" id="isFree"></label>
                <label>مخفي <input type="checkbox" id="isHidden"></label>
                <button class="btn" onclick="addCourse()">إضافة كورس</button>
            `;
        }

        window.addCourse = async () => {
            const title = document.getElementById('courseTitle').value;
            const gradeId = document.getElementById('courseGrade').value;
            const isFree = document.getElementById('isFree').checked;
            const isHidden = document.getElementById('isHidden').checked;
            await db.collection('courses').add({ title, gradeId, isFree, isHidden, lectures: [] });
            navigate('courses');
        };

        async function renderLectures() {
            const coursesSnap = await db.collection('courses').get();
            let options = '';
            coursesSnap.forEach(c => options += `<option value="${c.id}">${c.data().title}</option>`);
            return `
                <div class="top-bar"><h1 class="page-title">المحاضرات</h1></div>
                <select id="lectureCourse">${options}</select>
                <input id="lectureTitle" placeholder="عنوان المحاضرة">
                <input id="lectureVideo" placeholder="رابط الفيديو">
                <button class="btn" onclick="addLecture()">إضافة محاضرة</button>
            `;
        }

        window.addLecture = async () => {
            const courseId = document.getElementById('lectureCourse').value;
            const title = document.getElementById('lectureTitle').value;
            const video = document.getElementById('lectureVideo').value;
            const courseRef = db.collection('courses').doc(courseId);
            const courseDoc = await courseRef.get();
            const lectures = courseDoc.data().lectures || [];
            lectures.push({ title, video });
            await courseRef.update({ lectures });
            navigate('lectures');
        };

        async function renderExams() {
            return `<div class="top-bar"><h1 class="page-title">الامتحانات</h1></div><p>قريباً - إضافة أسئلة MCQ وصح/خطأ.</p>`;
        }

        async function renderNotifications() {
            return `
                <div class="top-bar"><h1 class="page-title">الإشعارات</h1></div>
                <textarea id="notifMessage" placeholder="نص الإشعار"></textarea>
                <button class="btn" onclick="sendNotification()">إرسال إشعار</button>
                <div id="notifPreview" class="notification-bar" style="display:none;"></div>
            `;
        }

        window.sendNotification = async () => {
            const msg = document.getElementById('notifMessage').value;
            await db.collection('notifications').add({ message: msg, date: new Date() });
            const bar = document.getElementById('notifPreview');
            bar.textContent = msg;
            bar.style.display = 'block';
            setTimeout(() => bar.style.display = 'none', 4000);
        };

        async function renderPayments() {
            const snap = await db.collection('students').get();
            let rows = '';
            snap.forEach(doc => {
                const s = doc.data();
                (s.payments || []).forEach(p => {
                    rows += `<tr><td>${s.fullName}</td><td>${p.amount} جنيه</td><td>${p.date}</td></tr>`;
                });
            });
            return `<div class="top-bar"><h1 class="page-title">المدفوعات</h1></div>
            <div class="table-responsive"><table><thead><tr><th>الطالب</th><th>المبلغ</th><th>التاريخ</th></tr></thead><tbody>${rows || '<tr><td colspan="3">لا توجد مدفوعات</td></tr>'}</tbody></table></div>`;
        }

        async function renderSettings() {
            const doc = await db.collection('settings').doc('theme').get();
            const data = doc.exists ? doc.data() : {};
            return `
                <div class="top-bar"><h1 class="page-title">الإعدادات</h1></div>
                <div class="card">
                    <label>اللون الأساسي</label>
                    <input type="color" id="primaryColor" value="${data.primaryColor || '#2563EB'}">
                    <label>اللون الثانوي</label>
                    <input type="color" id="secondaryColor" value="${data.secondaryColor || '#14B8A6'}">
                    <label>رفع اللوجو</label>
                    <input type="file" id="logoFile" accept="image/*">
                    <button class="btn" onclick="saveSettings()">حفظ الإعدادات</button>
                </div>
            `;
        }

        window.saveSettings = async () => {
            const primary = document.getElementById('primaryColor').value;
            const secondary = document.getElementById('secondaryColor').value;
            const file = document.getElementById('logoFile').files[0];
            const updateData = { primaryColor: primary, secondaryColor: secondary };
            if (file) {
                const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', 'ml_default');
                const res = await fetch('https://api.cloudinary.com/v1_1/ml_default/image/upload', { method: 'POST', body: fd });
                const data = await res.json();
                updateData.logoURL = data.secure_url;
            }
            await db.collection('settings').doc('theme').set(updateData, { merge: true });
            document.documentElement.style.setProperty('--primary', primary);
            document.documentElement.style.setProperty('--secondary', secondary);
            if (updateData.logoURL) {
                document.getElementById('sidebarLogo').innerHTML = `<img src="${updateData.logoURL}" alt="Logo">`;
            }
            alert('تم حفظ الإعدادات');
        };

        // Dark mode toggle
        const darkToggle = document.createElement('button');
        darkToggle.className = 'btn btn-outline';
        darkToggle.textContent = '🌓';
        darkToggle.style.position = 'fixed';
        darkToggle.style.bottom = '20px';
        darkToggle.style.left = '20px';
        darkToggle.style.zIndex = '300';
        darkToggle.onclick = () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        };
        document.body.appendChild(darkToggle);
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    </script>
</body>
</html>
